services:

  # ingestion layer #

  # runs zookeeper, which kafka needs to manage cluster state and metadata.
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.6.1
  #   container_name: kafka_zookeeper
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #   ports:
  #     - "2181:2181"

  # runs the kafka broker, the actual message queue that stores and serves messages to producers and consumers.
  # kafka:
  #   image: confluentinc/cp-kafka:7.6.1
  #   container_name: kafka_broker
  #   depends_on:
  #     - zookeeper
  #   environment:
  #     KAFKA_BROKER_ID: "1"
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  #     KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  #     KAFKA_CREATE_TOPICS: "binance-trades:1:1"
  #   ports:
  #     - "29092:9092"

  # # starts the binance websocket producer script and writes live trade events into kafka.
  # producer:
  #   build: .
  #   depends_on:
  #     - kafka
  #   volumes:
  #     - .:/app
  #   environment:
  #     KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  #     TOPIC_NAME: binance-trades
  #     BINANCE_SYMBOL: btcusdt
  #     BINANCE_API_KEY: ${BINANCE_API_KEY:-}
  #     BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
  #   command: [ "python", "-m", "src.streaming.producer" ]

  # # starts the kafka consumer script and reads/prints messages from the kafka topic.
  # consumer:
  #   build: .
  #   depends_on:
  #     - kafka
  #   volumes:
  #     - .:/app
  #   environment:
  #     KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  #     TOPIC_NAME: binance-trades
  #     CONSUMER_GROUP: binance-consumer-group
  #   command: [ "python", "-m", "src.streaming.consumer" ]

  # ! storage Layer 
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: islem
      MINIO_ROOT_PASSWORD: islemislem
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data

  # ! transformation layer 

  # spark master node that manages the cluster and schedules jobs on worker nodes; also provides the Spark UI on port 8080.
  # spark-master:
  #   image: islemchammakhi/spark-master:1.0
  #   container_name: spark_master
  #   ports:
  #     - "8080:8080"
  #     - "7077:7077"
  #   environment:
  #     - SPARK_MODE=master
  #     - SPARK_MASTER_HOST=0.0.0.0
  #     - SPARK_MASTER_PORT=7077
  #     - SPARK_MASTER_WEBUI_PORT=8080
  #   # command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
  #   volumes:
  #     - spark-data:/opt/spark/work-dir
  #     # - .:/app

  #     # spark worker node that executes tasks assigned by the master (can be scaled); scale with docker compose up --scale spark-worker=2.
  # spark-worker:
  #   image: apache/spark:3.5.0
  #   depends_on:
  #     - spark-master
  #   command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
  #     spark://spark-master:7077
  #   ports:
  #     - "8081:8081"
  #   volumes:
  #     - spark-data:/opt/spark/work-dir
  #     - .:/app
  #   environment:
  #     - SPARK_MODE=worker
  #     - SPARK_MASTER_URL=spark://spark-master:7077
  #     - SPARK_WORKER_MEMORY=1g
  #     - SPARK_WORKER_CORES=2

  # # container used to submit spark jobs manually using spark-submit
  # spark:
  #   image: apache/spark:3.5.0
  #   depends_on:
  #     - spark-master
  #   volumes:
  #     - .:/app
  #   working_dir: /app
  #   environment:
  #     - PYSPARK_PYTHON=python3
  #     - PYTHONPATH=/app
  #   tty: true

  spark-master:
    image: islemchammakhi/spark-master:1.0
    container_name: spark-master
    ports:
      - "7077:7077"
      - "8081:8080"
    depends_on:
      - minio
    environment:
      - SPARK_MODE=master
    # volumes:
    #   - ./spark:/app

  spark-worker-1:
    image: islemchammakhi/spark-worker:1.0
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    volumes:
      - ./spark:/app

  # spark-worker-2:
  #   image: islemchammakhi/spark-worker:1.0
  #   container_name: spark-worker-2
  #   depends_on:
  #     - spark-master
  #   environment:
  #     - SPARK_MODE=worker
  #     - SPARK_MASTER_URL=spark://spark-master:7077
  #   volumes:
  #     - ./spark:/app

  spark-client:
    image: islemchammakhi/spark-client:1.0
    container_name: spark-client
    depends_on:
      - spark-master
    volumes:
      - ./spark:/app
    working_dir: /app
    tty: true

  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped

  dashboard:
    build:
      context: ./docker/streamlit
    container_name: streamlit_dashboard
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

volumes:
  spark-data:
  grafana_data:
